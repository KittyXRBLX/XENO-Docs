<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet" id="hljs-theme" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js"></script>
  <style>
    /* ── TOKENS ── */
    :root {
      --bg: #0b0b0e;
      --surface: #16161a;
      --border: #23232a;
      --accent: #a78bfa;
      --accent-dim: #1a1428;
      --text: #ffffff;
      --text-muted: #94a3b8;
      --header-h: 64px;
      --sidebar-w: 280px;
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="light"] {
      --bg: #f8f8fc;
      --surface: #ededf5;
      --border: #dddde8;
      --accent: #7c3aed;
      --accent-dim: #ede9fe;
      --text: #0f0f14;
      --text-muted: #5a5a78;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: background var(--transition), color var(--transition);
    }

    /* ── HEADER ── */
    header {
      height: var(--header-h); background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: fixed; top: 0; width: 100%; z-index: 1000;
      transition: background var(--transition), border-color var(--transition);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-img { width: 28px; height: 28px; object-fit: contain; }
    .logo-name { font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 10px; }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition); font-size: 1rem;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .theme-toggle .icon-sun  { display: none; }
    .theme-toggle .icon-moon { display: block; }
    [data-theme="light"] .theme-toggle .icon-sun  { display: block; }
    [data-theme="light"] .theme-toggle .icon-moon { display: none; }

    .discord-btn {
      display: flex; align-items: center; gap: 8px;
      background: #5865F2; color: white; text-decoration: none;
      padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      transition: background 0.2s;
    }
    .discord-btn:hover { background: #4752c4; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); height: calc(100vh - var(--header-h));
      position: fixed; top: var(--header-h); left: 0;
      border-right: 1px solid var(--border); padding: 24px;
      background: var(--bg); z-index: 999; overflow-y: auto;
      transition: transform 0.3s ease, background var(--transition), border-color var(--transition);
    }
    .nav-section-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--text-muted); opacity: 0.5;
      text-transform: uppercase; margin: 20px 0 8px;
    }
    .nav-section-label:first-child { margin-top: 0; }
    .nav-item { margin-bottom: 2px; }
    .nav-link {
      display: block; padding: 9px 10px; color: var(--text-muted);
      font-size: 0.9rem; cursor: pointer;
      transition: color var(--transition), background var(--transition);
      border-radius: 7px;
    }
    .nav-link:hover { color: var(--text); background: var(--surface); }
    .nav-link.active { color: var(--accent); font-weight: 600; background: var(--accent-dim); }
    .sub-nav { display: none; margin-left: 10px; margin-bottom: 4px; border-left: 1px solid var(--border); padding-left: 12px; }
    .sub-nav.open { display: block; }
    .sub-link { display: block; padding: 5px 0; color: var(--text-muted); font-size: 0.83rem; cursor: pointer; transition: color 0.2s; opacity: 0.7; }
    .sub-link:hover { color: var(--text); opacity: 1; }

    /* ── MAIN ── */
    main { margin-left: var(--sidebar-w); padding: 100px 40px 60px; max-width: 900px; min-height: 100vh; }

    /* ── PAGE TRANSITIONS ── */
    .page { display: none; opacity: 0; transform: translateY(10px); }
    .page.active {
      display: block;
      animation: pageIn 0.28s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TYPOGRAPHY ── */
    .breadcrumbs { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 30px; }
    .breadcrumbs .cur { color: var(--accent); font-weight: 500; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 16px; letter-spacing: -1px; }
    p { color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
    code {
      background: var(--surface); border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 4px; font-size: 0.88em;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: var(--accent);
    }

    .hero-image-container {
      margin: 28px 0 36px; border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border); box-shadow: 0 8px 48px rgba(0,0,0,0.4);
      transition: border-color var(--transition);
    }
    .hero-image-container img { width: 100%; display: block; }

    /* ── SECTION HEADINGS WITH ANCHOR ── */
    .section-label {
      font-size: 1.5rem; font-weight: 700; margin: 48px 0 20px;
      scroll-margin-top: 80px;
      display: flex; align-items: center; gap: 8px;
    }
    .anchor-link {
      opacity: 0; font-size: 1rem; color: var(--accent);
      text-decoration: none; transition: opacity 0.2s;
      user-select: none;
    }
    .section-label:hover .anchor-link { opacity: 1; }

    /* ── CODE BLOCKS ── */
    .code-container { position: relative; margin: 20px 0; }
    .code-container pre {
      border-radius: 12px; border: 1px solid var(--border);
      overflow-x: auto; line-height: 1.55; margin: 0;
      font-size: 0.85rem;
      transition: border-color var(--transition);
    }
    /* override hljs padding to make room for copy btn */
    .code-container pre code.hljs { padding: 44px 20px 20px !important; border-radius: 12px; }

    .code-copy {
      position: absolute; top: 10px; right: 10px; z-index: 2;
      background: rgba(30,30,36,0.85); border: 1px solid #33333c;
      color: var(--text-muted); padding: 5px 12px;
      border-radius: 6px; font-size: 0.72rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      backdrop-filter: blur(4px);
      font-family: 'Inter', sans-serif;
    }
    [data-theme="light"] .code-copy { background: rgba(240,238,248,0.9); border-color: var(--border); }
    .code-copy:hover, .code-copy.copied {
      background: var(--accent-dim); border-color: var(--accent); color: var(--accent);
    }
    .code-lang-tag {
      position: absolute; top: 11px; left: 14px; z-index: 2;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted); opacity: 0.5;
      font-family: 'Inter', sans-serif; pointer-events: none;
    }

    /* ── FOOTER NAV ── */
    .footer-nav { margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border); display: flex; gap: 20px; transition: border-color var(--transition); }
    .nav-btn {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 16px; border-radius: 10px;
      cursor: pointer; transition: all var(--transition);
      display: flex; flex-direction: column; text-align: left; font-family: inherit;
    }
    .nav-btn.right { text-align: right; }
    .nav-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
    .nav-btn span { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .nav-btn strong { font-size: 1rem; display: block; }
    .nav-spacer { flex: 1; }

<script>
document.addEventListener('DOMContentLoaded', function () {

  // ── Syntax highlighting ──────────────────────────────────────
  hljs.highlightAll();

  // ── Theme toggle ─────────────────────────────────────────────
  var html = document.documentElement;
  var themeBtn = document.getElementById('themeToggle');
  var hljsLight = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css';
  var hljsDark  = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
  var hljsEl = document.getElementById('hljs-theme');

  var saved = localStorage.getItem('xeno-theme') || 'dark';
  applyTheme(saved);

  themeBtn.addEventListener('click', function () {
    var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('xeno-theme', next);
  });

  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    hljsEl.href = t === 'light' ? hljsLight : hljsDark;
  }

  // ── Page navigation ──────────────────────────────────────────
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(function (p) {
      p.classList.remove('active');
    });
    var target = document.getElementById(pageId);
    if (target) {
      target.classList.add('active');
      window.scrollTo(0, 0);
    }
    document.querySelectorAll('.nav-link').forEach(function (link) {
      link.classList.toggle('active', link.dataset.page === pageId);
    });
    document.querySelectorAll('.sub-nav').forEach(function (sub) { sub.classList.remove('open'); });
    var subNav = document.getElementById('sub-' + pageId);
    if (subNav) subNav.classList.add('open');
    document.getElementById('sidebar').classList.remove('open');
  }

  function scrollToSection(pageId, sectionId) {
    if (!document.getElementById(pageId).classList.contains('active')) showPage(pageId);
    setTimeout(function () {
      var el = document.getElementById(sectionId);
      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 80, behavior: 'smooth' });
    }, 60);
  }

  document.querySelectorAll('.nav-link[data-page]').forEach(function (link) {
    link.addEventListener('click', function () { showPage(link.dataset.page); });
  });
  document.querySelectorAll('.sub-link[data-section]').forEach(function (link) {
    link.addEventListener('click', function () { scrollToSection(link.dataset.page, link.dataset.section); });
  });
  document.querySelectorAll('.nav-btn[data-page]').forEach(function (btn) {
    btn.addEventListener('click', function () { showPage(btn.dataset.page); });
  });

  // ── Copy buttons ─────────────────────────────────────────────
  document.querySelectorAll('.code-copy').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var codeEl = btn.parentElement.querySelector('code');
      if (!codeEl) return;
      navigator.clipboard.writeText(codeEl.innerText).then(function () {
        var orig = btn.textContent;
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(function () { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
      });
    });
  });

  // ── Anchor copy-link ─────────────────────────────────────────
  document.querySelectorAll('.anchor-link').forEach(function (a) {
    a.addEventListener('click', function (e) {
      e.preventDefault();
      var url = window.location.href.split('#')[0] + a.getAttribute('href');
      navigator.clipboard.writeText(url).then(function () {
        var orig = a.textContent;
        a.textContent = '✓';
        setTimeout(function () { a.textContent = orig; }, 1500);
      });
    });
  });

  // ── Mobile menu ──────────────────────────────────────────────
  document.getElementById('menuBtn').addEventListener('click', function () {
    document.getElementById('sidebar').classList.toggle('open');
  });

  showPage('intro');
});
</script>
